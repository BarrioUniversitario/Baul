#
# Archivo de mensajes de Baúl
# Puedes cambiar cualquier mensaje en este archivo
#
# Si quieres restablecer un mensaje a su valor por defecto,
# elimina la línea completa del mensaje y reinicia el servidor.
#

Prefix: '<gradient:#FFAA00:#FF6600><bold>Baúl</bold> <gray>»</gray></gradient>'

Times:
  Days: dias
  Day: dia
  Hours: horas
  Hour: hora
  Minutes: minutos
  Minute: minuto
  Seconds: segundos
  Second: segundo

Commands:
  NoPerms: '%prefix% <red>¡No tienes permisos para usar este comando!</red>'
  Reload: '%prefix% <gradient:#00FF00:#55FF55>Plugin recargado sin errores!</gradient>'
  Balance:
    Cubelets: '<gradient:#55FF55:#00AA00>Actualmente tienes <bold><gold>%baul_available%</gold></bold> baúles para abrir!</gradient>'
    Points: '<gradient:#55FF55:#00AA00>Actualmente tienes <bold><gold>%baul_points%</gold></bold> puntos de botín!</gradient>'
  Cubelets:
    Give: '%prefix% <gradient:#55FF55:#00AA00>Enviados <bold><yellow>%amount%x %baul%</yellow></bold> a <yellow>%player%</yellow></gradient>'
    Remove:
      Removed: '%prefix% <gradient:#55FF55:#00AA00>Quitados <bold><yellow>%amount%x %baul%</yellow></bold> de <yellow>%player%</yellow></gradient>'
      NoBalance: '%prefix% <gold>%player%</gold> <red>no tiene <gold>%amount%x %baul%</gold>. Balance actual: <gold>%balance%</gold></red>'
    Clear: '%prefix% <gradient:#55FF55:#00AA00>Borrados los baúles de <bold><gold>%player%</gold></bold></gradient>'
    Gift:
      Yourself: '%prefix% <red>¡No puedes regalarte <bold>baúles</bold> a ti mismo!</red>'
      Gifted: '%prefix% <gradient:#55FF55:#00AA00>Regalados <bold><yellow>%amount%x %baul%</yellow></bold> a <yellow>%player%</yellow></gradient>'
      Received: '%prefix% <gradient:#55FF55:#00AA00>Has recibido <bold><yellow>%amount%x %baul%</yellow></bold> de <yellow>%player%</yellow></gradient>'
    GiveKey:
      Give: '%prefix% <gradient:#55FF55:#00AA00>Enviadas <bold><yellow>%amount%x llave(s) de %baul%</yellow></bold> a <yellow>%player%</yellow></gradient>'
      Received: '%prefix% <gradient:#55FF55:#00AA00>Recibidas <bold><yellow>%amount%x llave(s) de %baul%</yellow></bold></gradient>'
    Info:
      NotHave: '%prefix% <bold><gradient:#FFAA00:#FF6600>%player%</gradient></bold> <red>no tiene <bold>baúles</bold></red>'
      Have:
        Header: '%prefix% <bold><gradient:#FFAA00:#FF6600>%player%</gradient></bold> <gradient:#55FF55:#00AA00>tiene los siguientes <bold>baúles</bold>:</gradient>'
        List: ' <gray>-</gray> <white>%baul%</white> <dark_gray>x%amount%</dark_gray>'
  Points:
    Give: '%prefix% <gradient:#55FF55:#00AA00>Enviados <bold><yellow>%amount%x Puntos</yellow></bold> a <yellow>%player%</yellow></gradient>'
    Set: '%prefix% <gradient:#55FF55:#00AA00>Establecidos <bold><yellow>%amount%x Puntos</yellow></bold> a <yellow>%player%</yellow></gradient>'
    Remove:
      Removed: '%prefix% <gradient:#55FF55:#00AA00>Quitados <bold><yellow>%amount%x Puntos</yellow></bold> de <yellow>%player%</yellow></gradient>'
      NoBalance: '%prefix% <gold>%player%</gold> <red>no tiene <gold>%amount%x Puntos</gold>. Balance actual: <gold>%balance%</gold></red>'
    Info: '%prefix% <bold><gradient:#FFAA00:#FF6600>%player%</gradient></bold> <gradient:#55FF55:#00AA00>tiene <bold><gold>%amount%</gold></bold> Puntos.</gradient>'

Admin:
  Cubelet:
    Setup:
      TypeIcon:
        ErrorHoldCorrectItem: '%prefix% <red>¡Debes tener un objeto en tu mano!</red>'

Cubelet:
  LoginReminder:
    - ''
    - '<gradient:#FFAA00:#FF6600><bold>%player%</bold></gradient> <gradient:#55FF55:#00AA00>aún tienes <bold><gold>%amount%</gold></bold> baúles por abrir!</gradient>'
    - ''
  BoxInUse:
    Me: '<red>¡Ya estás abriendo un <bold><gradient:#FFAA00:#FF6600>Baúl</gradient></bold> en esta máquina!</red>'
    Other: '<bold><gradient:#FFAA00:#FF6600>%player%</gradient></bold> <red>está abriendo un <bold><gradient:#FFAA00:#FF6600>Baúl</gradient></bold> en esta máquina!</red>'
  Reward:
    Broadcast: '%prefix% <bold><gradient:#FFAA00:#FF6600>%player%</gradient></bold> <gradient:#55FF55:#00AA00>consiguió <bold><gradient:#FF5555:#FF0000>%reward%</gradient></bold> en <bold><gradient:#FFAA00:#FF6600>%baul%</gradient></bold>.</gradient>'
    New:
      - ''
      - '<center><bold><gradient:#FFAA00:#FF6600>%baul_type%</gradient> <gray>Botín</gray></bold></center>'
      - '<center><color:#AA00AA>Has encontrado: <bold><gradient:#00FF00:#55FF55>%reward_name%</gradient></bold></color></center>'
      - '<center><color:#AA00AA>Rareza: %reward_rarity%</color></center>'
      - ''
    Duplicate:
      - ''
      - '<center><bold><gradient:#FFAA00:#FF6600>%baul_type%</gradient> <gray>Botín</gray></bold></center>'
      - '<center><color:#AA00AA>Has encontrado: <bold><gradient:#00FF00:#55FF55>%reward_name%</gradient></bold></color></center>'
      - '<center><color:#AA00AA>Rareza: %reward_rarity%</color></center>'
      - '<center><color:#AA00AA>Recompensa duplicada: <bold><gradient:#00FF00:#55FF55>%points% Puntos de Botín</gradient></bold></color></center>'
      - ''
  NoCubelets:
    - ''
    - '<center><gradient:#55FF55:#00AA00>Puedes comprar <bold>Baúles</bold> en nuestra tienda <bold><color:#FF0000>✪ AQUÍ ✪</color></bold></gradient></center>'
    - '<center><gradient:#FFAA00:#FF6600>https://ejemplo.com</gradient></center>'
    - ''

Holograms:
  CubeletAvailable:
    - '<bold><gradient:#FFAA00:#FF6600>Máquina de Baúles</gradient></bold>'
    - '<color:#55AAFF>Click para abrir</color>'
    - '%blink%%baul_available% Baúles'
  NoCubeletAvailable:
    - '<bold><gradient:#FFAA00:#FF6600>Máquina de Baúles</gradient></bold>'
    - '<color:#55AAFF>Click para abrir</color>'
  Reward:
    New:
      Me:
        - '<gradient:#55FF55:#00AA00>Has encontrado</gradient>'
        - '<bold><gradient:#FFFF55:#FFAA00>%reward_name%</gradient></bold>'
        - '<color:#AA00AA>Rareza: %reward_rarity%</color>'
        - '%reward_icon%'
      Other:
        - '<gradient:#55FF55:#00AA00>%player% ha encontrado</gradient>'
        - '<bold><gradient:#FFFF55:#FFAA00>%reward_name%</gradient></bold>'
        - '<color:#AA00AA>Rareza: %reward_rarity%</color>'
        - '%reward_icon%'
    Duplicate:
      - '<bold><gradient:#00FFFF:#00AAAA>DUPLICADO</gradient></bold>'
      - '<bold><gradient:#FFAA00:#FF6600>+%points% Puntos de Botín</gradient></bold>'
      - '<bold><gradient:#FFFF55:#FFAA00>%reward_name%</gradient></bold>'
      - '<color:#AA00AA>Rareza: %reward_rarity%</color>'
      - '%reward_icon%'
