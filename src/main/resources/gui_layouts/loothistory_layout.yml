#
# This is the gui layout file.
# You can change any messages that are in this file
#
# If you want to reset a message back to the default,
# delete the entire line the message is on and restart the server.
#
# You can use %current_page% and %total_pages% in Title to show pages information
#
# IMPORTANT: Slots numbers between 1-9, if not, the plugin will crash
#

Layout:

  # GUI Title
  Title: '<gradient:#FFAA00:#FF6B00><bold>Loot History</bold></gradient>'

  # GUI items
  Items:

    # Each loot item
    LootItem:
      Name: '<gradient:#FFAA00:#FFCC44><bold>%reward_name%</bold></gradient>'
      Lore:
        - '<gradient:#AA00AA:#BB55BB>Found in: <gradient:#55FF55:#88FF88>%baul_name%</gradient></gradient>'
        - '<gradient:#AA00AA:#BB55BB>Received: <gradient:#55FF55:#88FF88>%received%</gradient> ago</gradient>'

    NoHistory:
      Name: '<gradient:#FF5555:#FF8888>You have no loot history</gradient>'
      Material: 'BARRIER'
      Lore:
        - '<gradient:#AAAAAA:#BBBBBB>You can get loot by opening Baúls.</gradient>'

    # Back item
    Back:
      Name: '<gradient:#5555FF:#8888FF>Back</gradient>'
      Material: 'BOOK'
      Slot: 5
      Lore:
        - '<gradient:#AAAAAA:#BBBBBB>GO back to the previous</gradient>'
        - '<gradient:#AAAAAA:#BBBBBB>menu.</gradient>'

    # Close item
    Close:
      Name: '<gradient:#5555FF:#8888FF>Close</gradient>'
      Material: 'BOOK'
      Slot: 5
      Lore:
        - '<gradient:#AAAAAA:#BBBBBB>Click to close</gradient>'
        - '<gradient:#AAAAAA:#BBBBBB>this menu</gradient>'

    # Next page item
    NextPage:
      Name: '<gradient:#FFAA00:#FFCC44>Next page</gradient>'
      Material: 'SUGAR_CANE'
      Slot: 9
      ShowPageNumber: false

    # Previous page item
    PreviousPage:
      Name: '<gradient:#FFAA00:#FFCC44>Previous page</gradient>'
      Material: 'SUGAR_CANE'
      Slot: 1
      ShowPageNumber: false
